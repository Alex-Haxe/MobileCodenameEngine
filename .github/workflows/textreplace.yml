name: Replace Text

on:
  workflow_dispatch:
    inputs:
      find_word:
        description: 'Word to search for'
        required: true
        type: string
      replace_word:
        description: 'Word to replace with'
        required: true
        type: string

jobs:
  replace-text:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace text in all files
        run: |
          echo "Searching for: ${{ github.event.inputs.find_word }}"
          echo "Replacing with: ${{ github.event.inputs.replace_word }}"
          
          find . -type f -not -path '*/.*' -exec sed -i 's/${{ github.event.inputs.find_word }}/${{ github.event.inputs.replace_word }}/g' {} +

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Changed: ${{ github.event.inputs.find_word }} to ${{ github.event.inputs.replace_word }}"
